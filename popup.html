<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Kick Chat Font Ayarı</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      background: #0f0f0f;
      color: #e8e8e8;
      font-family: 'Segoe UI', sans-serif;
      padding: 18px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid #2a2a2a;
    }

    .header .logo {
      width: 28px;
      height: 28px;
      background: #53fc18;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 900;
      color: #000;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.3px;
    }

    .header p {
      font-size: 11px;
      color: #666;
      margin-top: 1px;
    }

    .section {
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #53fc18;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .row label {
      font-size: 13px;
      color: #ccc;
    }

    .row .val {
      font-size: 13px;
      font-weight: 700;
      color: #53fc18;
      min-width: 36px;
      text-align: right;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: #2a2a2a;
      border-radius: 4px;
      outline: none;
      margin-bottom: 12px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #53fc18;
      cursor: pointer;
      transition: transform 0.1s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .reset-btn {
      width: 100%;
      padding: 9px;
      background: transparent;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #888;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 4px;
    }

    .reset-btn:hover {
      border-color: #53fc18;
      color: #53fc18;
    }

    .status {
      font-size: 11px;
      color: #444;
      text-align: center;
      margin-top: 12px;
    }

    .status.saved {
      color: #53fc18;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">K</div>
    <div>
      <h1>Kick Chat Font</h1>
      <p>kick.com chat ayarları</p>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Mesaj Yazı Boyutu</div>
    <div class="row">
      <label>Boyut</label>
      <span class="val" id="msgSizeVal">13px</span>
    </div>
    <input type="range" id="msgSize" min="10" max="24" step="1" value="13" />
  </div>

  <div class="section">
    <div class="section-title">Kullanıcı Adı Boyutu</div>
    <div class="row">
      <label>Boyut</label>
      <span class="val" id="userSizeVal">13px</span>
    </div>
    <input type="range" id="userSize" min="10" max="24" step="1" value="13" />
  </div>

  <div class="section">
    <div class="section-title">Satır Aralığı</div>
    <div class="row">
      <label>Aralık</label>
      <span class="val" id="lineHeightVal">1.4</span>
    </div>
    <input type="range" id="lineHeight" min="10" max="22" step="1" value="14" />
  </div>

  <button class="reset-btn" id="resetBtn">↺ Varsayılana sıfırla</button>
  <div class="status" id="status">kick.com sekmesinde aktif</div>

  <script src="popup.js"></script>
</body>
</html>
